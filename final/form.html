	<body>
		<header>
			<img
				src="images/siteicon.png"
				alt="Site Logo"
				width="512"
				height="512"
				loading="lazy" />
			<span>Newsletter Form</span>
			<button id="ham-btn" class="hamburger"></button>
		</header>
		<nav id="nav-bar" class="navigation">
			<ul>
				<li><a href="index.html">Home</a></li>

			</ul>
		</nav>
		<main>
			<h1>Newsletter Signup</h1>
			<form method="GET" action="thanks.html">
				<label
					>Full Name
					<input
						type="text"
						name="fullname"
						required
						autocomplete="given-name"
						title="Your Full Name"
						placeholder="Full Name"
				/></label>
				<label
					>Email
					<input
						type="email"
						name="email"
						required
						placeholder="john89@gmail.com"
						title="Your Email"
						autocomplete="email"
				/></label>
				<input type="submit" value="Join Newsletter" />
			</form>
		</main>
		<footer>
			<p>©<span id="currentyear"></span> ⛰️ Brant Martin ⛰️ USA</p>
